<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hello World Styles</title>

<style>
body {
    background-color: #e5e5e5;
    font-family: "Times New Roman", serif;
}

.container {
    width: 700px;
    margin: 50px auto;
    background: #f2f2f2;
    padding: 30px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

h1 {
    margin: 0;
}

/* Top box */
.box1 {
    background: linear-gradient(to right, #a9c6d1, #7fa6b5);
    border: 8px double #ff5c3a;
    padding: 15px;
    margin-bottom: 25px;
}

/* Middle box */
.box2 {
    background: yellow;
    border: 4px solid #2a7de1;
    border-radius: 15px;
    padding: 15px;
    margin-bottom: 25px;
}

/* Bottom box (圓點效果) */
.box3 {
    background-color: #3cb371;
    padding: 15px;

    /* 圓點邊框效果 */
    border: 8px solid transparent;
    background-image:
        radial-gradient(gray 6px, transparent 7px),
        radial-gradient(gray 6px, transparent 7px);
    background-size: 30px 30px;
    background-position: 0 0, 15px 15px;

    /* 讓圓點只出現在邊框 */
    background-clip: padding-box, border-box;
}
</style>
</head>

<body>

<div class="container">

    <div class="box1">
        <h1>Hello World</h1>
    </div>

    <div class="box2">
        <h1>Hello World</h1>
    </div>

    <div class="box3">
        <h1>Hello World</h1>
    </div>

</div>

</body>
</html>
