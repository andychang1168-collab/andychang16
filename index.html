<!DOCTYPE html>
<html>
<head>
<title>CSS Borders and Backgrounds</title>
<style>
  .box {
    font-size: 32px;                              
    font-weight: bold;                            
    padding: 10px 20px;                           
    margin-bottom: 20px;                          
    width: 400px;                                
  }

  .style1 {
    background-color: lightblue; 
    border: 6px double red;       
  }

  .style2 {
    background-color: yellow;
    border: 3px solid #007bff;    
    border-radius: 15px;          
  }

  
  .style3 {
    background-color: #3cb371;    
    border: 8px dotted gray;      
  }
</style>
</head>
<body>

  <div class="box style1">Hello World</div>
  <div class="box style2">Hello World</div>
  <div class="box style3">Hello World</div>

</body>
</html>
